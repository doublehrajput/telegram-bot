name: Scheduled Telegram Bot Message

on:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  send-telegram-message:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run scheduled message script
        run: node index.js
